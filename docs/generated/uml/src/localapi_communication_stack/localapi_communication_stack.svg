<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="980" viewBox="0 0 1180 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .label { font: 13px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .group { fill: #fff; stroke: #94a3b8; stroke-width: 2; rx: 14; ry: 14; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 10; ry: 10; }
      .note { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.5; rx: 10; ry: 10; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <text x="34" y="42" class="title">local-api communication stack (arquitetura atual)</text>

  <rect x="30" y="72" width="1120" height="870" class="group"/>

  <rect x="78" y="120" width="220" height="58" class="box"/>
  <text x="100" y="146" class="label">WinForms UI</text>
  <text x="100" y="166" class="small">DashBoard / frmPortaSerial_UI / frmGSA_UI</text>

  <rect x="78" y="210" width="220" height="58" class="box"/>
  <text x="100" y="242" class="label">FrmBpmLogic / FrmGsaLogic</text>

  <rect x="78" y="300" width="220" height="64" class="note"/>
  <text x="100" y="327" class="label">BpmSerialService.Shared</text>
  <text x="100" y="347" class="small">acesso global transitório</text>

  <rect x="368" y="120" width="250" height="58" class="box"/>
  <text x="390" y="152" class="label">BpmSerialService</text>

  <rect x="368" y="210" width="250" height="58" class="box"/>
  <text x="390" y="242" class="label">BpmClient / GsaClient</text>

  <rect x="368" y="300" width="250" height="58" class="box"/>
  <text x="390" y="332" class="label">SdhClient</text>

  <rect x="368" y="390" width="250" height="58" class="box"/>
  <text x="390" y="422" class="label">SdgwSession</text>

  <rect x="368" y="480" width="250" height="86" class="box"/>
  <text x="390" y="507" class="label">SdGwTxScheduler</text>
  <text x="390" y="529" class="small">TX central: High / Normal / Low</text>
  <text x="390" y="548" class="small">funcional High, supervisor Low</text>

  <rect x="368" y="598" width="250" height="58" class="box"/>
  <text x="390" y="630" class="label">SdGwLinkEngine</text>

  <rect x="368" y="688" width="250" height="58" class="box"/>
  <text x="390" y="720" class="label">SerialTransport</text>

  <rect x="720" y="238" width="260" height="98" class="box"/>
  <text x="742" y="266" class="label">SdGwLinkSupervisor</text>
  <text x="742" y="288" class="small">watchdog por silêncio de RX válido</text>
  <text x="742" y="307" class="small">só agenda ping sob ociosidade</text>

  <rect x="720" y="430" width="360" height="118" class="note"/>
  <text x="742" y="458" class="label">Comportamento atual de RX</text>
  <text x="742" y="482" class="small">Após o primeiro Linked, o host continua</text>
  <text x="742" y="501" class="small">entregando SDGW binário ao engine mesmo</text>
  <text x="742" y="520" class="small">se o estado lógico cair temporariamente</text>
  <text x="742" y="539" class="small">para LinkFailed com a porta ainda aberta.</text>

  <rect x="720" y="610" width="360" height="108" class="note"/>
  <text x="742" y="638" class="label">Keepalive atual</text>
  <text x="742" y="662" class="small">RX SDGW válido mantém o link vivo.</text>
  <text x="742" y="681" class="small">Ping periódico fixo não é mais a base da sessão.</text>
  <text x="742" y="700" class="small">Busy não é mais a arbitragem principal.</text>

  <line x1="188" y1="178" x2="188" y2="210" class="line"/>
  <line x1="188" y1="268" x2="188" y2="300" class="line"/>
  <line x1="298" y1="332" x2="368" y2="149" class="line"/>
  <line x1="493" y1="178" x2="493" y2="210" class="line"/>
  <line x1="493" y1="268" x2="493" y2="300" class="line"/>
  <line x1="493" y1="358" x2="493" y2="390" class="line"/>
  <line x1="493" y1="448" x2="493" y2="480" class="line"/>
  <line x1="493" y1="566" x2="493" y2="598" class="line"/>
  <line x1="493" y1="656" x2="493" y2="688" class="line"/>

  <line x1="618" y1="523" x2="720" y2="287" class="line"/>
  <text x="630" y="402" class="small">ping Low</text>

  <line x1="618" y1="627" x2="720" y2="287" class="line dash"/>
  <text x="630" y="590" class="small">ValidFrameReceived</text>
</svg>
