<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="820" viewBox="0 0 1260 820">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .label { font: 13px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .group { fill: #fff; stroke: #94a3b8; stroke-width: 2; rx: 14; ry: 14; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 10; ry: 10; }
      .note { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.5; rx: 10; ry: 10; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="34" y="42" class="title">SDGW TX Scheduler / Dispatcher</text>

  <rect x="28" y="78" width="300" height="680" class="group"/>
  <text x="52" y="108" class="section">Produtores</text>

  <rect x="60" y="138" width="236" height="62" class="box"/>
  <text x="82" y="165" class="label">GsaClient</text>
  <text x="82" y="185" class="small">comando funcional - prioridade High</text>

  <rect x="60" y="232" width="236" height="62" class="box"/>
  <text x="82" y="259" class="label">BpmClient</text>
  <text x="82" y="279" class="small">comando funcional - prioridade High</text>

  <rect x="60" y="326" width="236" height="62" class="box"/>
  <text x="82" y="353" class="label">Envio interno</text>
  <text x="82" y="373" class="small">prioridade Normal</text>

  <rect x="60" y="420" width="236" height="82" class="box"/>
  <text x="82" y="448" class="label">SdGwLinkSupervisor</text>
  <text x="82" y="470" class="small">mede silêncio de RX válido</text>
  <text x="82" y="489" class="small">agenda ping em Low</text>

  <rect x="372" y="78" width="320" height="680" class="group"/>
  <text x="396" y="108" class="section">Arbitragem central</text>

  <rect x="404" y="146" width="256" height="58" class="box"/>
  <text x="426" y="179" class="label">Fila High</text>

  <rect x="404" y="242" width="256" height="58" class="box"/>
  <text x="426" y="275" class="label">Fila Normal</text>

  <rect x="404" y="338" width="256" height="58" class="box"/>
  <text x="426" y="371" class="label">Fila Low</text>

  <rect x="404" y="456" width="256" height="108" class="box"/>
  <text x="426" y="484" class="label">SdGwTxScheduler</text>
  <text x="426" y="506" class="small">ordem: High -&gt; Normal -&gt; Low</text>
  <text x="426" y="525" class="small">FIFO dentro da mesma prioridade</text>
  <text x="426" y="544" class="small">despacha um item por vez</text>

  <rect x="736" y="78" width="492" height="680" class="group"/>
  <text x="760" y="108" class="section">Execução técnica</text>

  <rect x="772" y="146" width="236" height="82" class="box"/>
  <text x="794" y="174" class="label">SdGwLinkEngine</text>
  <text x="794" y="196" class="small">stop-and-wait técnico</text>
  <text x="794" y="215" class="small">uma transação pendente por vez</text>

  <rect x="772" y="264" width="236" height="58" class="box"/>
  <text x="794" y="296" class="label">SerialTransport</text>

  <rect x="772" y="358" width="236" height="82" class="box"/>
  <text x="794" y="386" class="label">BPM / SggwLink</text>
  <text x="794" y="408" class="small">handshake textual inicial</text>
  <text x="794" y="427" class="small">operação SDGW binária depois</text>

  <rect x="1044" y="358" width="148" height="82" class="box"/>
  <text x="1066" y="386" class="label">GatewayApp</text>
  <text x="1066" y="408" class="small">GwRouter 100 ms</text>

  <rect x="1044" y="486" width="148" height="58" class="box"/>
  <text x="1088" y="518" class="label">GSA</text>

  <rect x="772" y="530" width="420" height="124" class="note"/>
  <text x="794" y="558" class="label">Comportamento esperado</text>
  <text x="794" y="582" class="small">Busy continua existindo como proteção técnica,</text>
  <text x="794" y="601" class="small">mas não deve ser o caminho normal de arbitragem</text>
  <text x="794" y="620" class="small">entre comando funcional e ping de supervisão.</text>

  <line x1="296" y1="169" x2="404" y2="175" class="line"/>
  <line x1="296" y1="263" x2="404" y2="175" class="line"/>
  <line x1="296" y1="357" x2="404" y2="271" class="line"/>
  <line x1="296" y1="461" x2="404" y2="367" class="line"/>

  <line x1="532" y1="204" x2="532" y2="242" class="line"/>
  <line x1="532" y1="300" x2="532" y2="338" class="line"/>
  <line x1="532" y1="396" x2="532" y2="456" class="line"/>
  <line x1="660" y1="510" x2="772" y2="187" class="line"/>
  <line x1="1008" y1="399" x2="1044" y2="399" class="line"/>
  <line x1="1118" y1="440" x2="1118" y2="486" class="line"/>
</svg>
