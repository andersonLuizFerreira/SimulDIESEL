<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .label { font: 13px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 10; ry: 10; }
      .group { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 14; ry: 14; }
      .note { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.5; rx: 10; ry: 10; }
      .fw { fill: #f8fafc; stroke: #475569; stroke-width: 1.5; rx: 10; ry: 10; }
      .gsa { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 10; ry: 10; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <text x="36" y="42" class="title">SimulDIESEL - Communication Stack (Arquitetura Atual)</text>

  <rect x="24" y="72" width="720" height="870" class="group"/>
  <text x="48" y="102" class="section">Host local (WinForms)</text>

  <rect x="780" y="72" width="430" height="870" class="group"/>
  <text x="804" y="102" class="section">BPM Gateway</text>

  <rect x="1240" y="72" width="236" height="870" class="group"/>
  <text x="1264" y="102" class="section">GSA</text>

  <rect x="56" y="128" width="180" height="58" class="box"/>
  <text x="76" y="153" class="label">WinForms UI</text>
  <text x="76" y="172" class="small">DashBoard / frmPortaSerial_UI / frmGSA_UI</text>

  <rect x="56" y="216" width="180" height="52" class="box"/>
  <text x="76" y="247" class="label">FrmBpmLogic / FrmGsaLogic</text>

  <rect x="56" y="298" width="180" height="62" class="note"/>
  <text x="76" y="323" class="label">BpmSerialService.Shared</text>
  <text x="76" y="343" class="small">acesso global transitório atual</text>

  <rect x="290" y="128" width="220" height="58" class="box"/>
  <text x="312" y="153" class="label">BpmSerialService</text>
  <text x="312" y="172" class="small">dono funcional do link serial da BPM</text>

  <rect x="290" y="216" width="220" height="52" class="box"/>
  <text x="312" y="247" class="label">BpmClient / GsaClient</text>

  <rect x="290" y="298" width="220" height="52" class="box"/>
  <text x="312" y="329" class="label">SdhClient</text>

  <rect x="290" y="380" width="220" height="52" class="box"/>
  <text x="312" y="411" class="label">SdgwSession</text>

  <rect x="290" y="462" width="220" height="86" class="box"/>
  <text x="312" y="489" class="label">SdGwTxScheduler</text>
  <text x="312" y="511" class="small">caminho central de TX</text>
  <text x="312" y="531" class="small">prioridades: High / Normal / Low</text>

  <rect x="290" y="578" width="220" height="58" class="box"/>
  <text x="312" y="603" class="label">SdGwLinkEngine</text>
  <text x="312" y="622" class="small">framing / ACK / timeout / retry</text>

  <rect x="290" y="666" width="220" height="58" class="box"/>
  <text x="312" y="691" class="label">SerialTransport</text>
  <text x="312" y="710" class="small">porta serial</text>

  <rect x="56" y="462" width="180" height="96" class="box"/>
  <text x="76" y="489" class="label">SdGwLinkSupervisor</text>
  <text x="76" y="511" class="small">watchdog por silêncio</text>
  <text x="76" y="531" class="small">ping somente em Low</text>

  <rect x="56" y="610" width="180" height="132" class="note"/>
  <text x="76" y="637" class="label">RX após o primeiro Linked</text>
  <text x="76" y="660" class="small">binário SDGW continua indo</text>
  <text x="76" y="679" class="small">ao engine mesmo se o estado</text>
  <text x="76" y="698" class="small">lógico cair temporariamente</text>
  <text x="76" y="717" class="small">para LinkFailed com a porta aberta</text>

  <rect x="818" y="128" width="356" height="86" class="fw"/>
  <text x="842" y="155" class="label">Handshake textual inicial</text>
  <text x="842" y="177" class="small">banner SIMULDIESELAPI -&gt; SimulDIESEL ver ...</text>
  <text x="842" y="197" class="small">depois disso: operação SDGW binária</text>

  <rect x="818" y="252" width="356" height="110" class="fw"/>
  <text x="842" y="279" class="label">SggwLink</text>
  <text x="842" y="301" class="small">keepalive por atividade SDGW válida</text>
  <text x="842" y="320" class="small">timeout de atividade da sessão: 4000 ms</text>
  <text x="842" y="339" class="small">PING 0x55 suportado, mas não é a única prova de vida</text>

  <rect x="818" y="400" width="356" height="58" class="fw"/>
  <text x="842" y="432" class="label">GatewayApp</text>

  <rect x="818" y="496" width="356" height="86" class="fw"/>
  <text x="842" y="523" class="label">GwRouter</text>
  <text x="842" y="545" class="small">roteamento interno da BPM</text>
  <text x="842" y="564" class="small">timeout do router/gateway: 100 ms</text>

  <rect x="1268" y="196" width="180" height="72" class="gsa"/>
  <text x="1292" y="225" class="label">GSA TLV / I2C</text>
  <text x="1292" y="247" class="small">comando funcional principal: LED</text>

  <rect x="1268" y="312" width="180" height="58" class="gsa"/>
  <text x="1292" y="344" class="label">LED_BUILTIN</text>

  <rect x="818" y="646" width="356" height="128" class="note"/>
  <text x="842" y="674" class="label">Arbitragem de TX</text>
  <text x="842" y="698" class="small">comandos funcionais entram com prioridade High</text>
  <text x="842" y="717" class="small">pings do supervisor entram com prioridade Low</text>
  <text x="842" y="736" class="small">Busy deixa de ser o mecanismo principal de disputa</text>
  <text x="842" y="755" class="small">entre tráfego funcional e supervisão</text>

  <line x1="146" y1="186" x2="146" y2="216" class="line"/>
  <line x1="146" y1="268" x2="146" y2="298" class="line"/>
  <line x1="236" y1="329" x2="290" y2="329" class="line"/>
  <line x1="400" y1="186" x2="400" y2="216" class="line"/>
  <line x1="400" y1="268" x2="400" y2="298" class="line"/>
  <line x1="400" y1="350" x2="400" y2="380" class="line"/>
  <line x1="400" y1="432" x2="400" y2="462" class="line"/>
  <line x1="400" y1="548" x2="400" y2="578" class="line"/>
  <line x1="400" y1="636" x2="400" y2="666" class="line"/>

  <line x1="236" y1="510" x2="290" y2="505" class="line"/>
  <text x="190" y="494" class="small">ping Low</text>
  <line x1="510" y1="607" x2="290" y2="510" class="line dash"/>
  <text x="516" y="599" class="small">ValidFrameReceived</text>

  <line x1="510" y1="695" x2="818" y2="171" class="line"/>
  <text x="600" y="415" class="small">bootstrap textual</text>

  <line x1="510" y1="695" x2="818" y2="307" class="line dash"/>
  <text x="622" y="535" class="small">RX/TX SDGW binário</text>

  <line x1="1174" y1="429" x2="1174" y2="496" class="line"/>
  <line x1="1174" y1="539" x2="1268" y2="232" class="line"/>
  <text x="1188" y="392" class="small">comando local BPM ou roteado</text>
  <line x1="1358" y1="268" x2="1358" y2="312" class="line"/>
</svg>
