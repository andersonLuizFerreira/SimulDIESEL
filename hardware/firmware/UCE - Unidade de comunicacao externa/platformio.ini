[platformio]
src_dir = .

[env:dueUSB]
platform = atmelsam
board = dueUSB
framework = arduino
monitor_speed = 115200

build_src_filter =
    +<src/main.cpp>
    +<lib/core/transport/*.cpp>
    +<lib/services/led/*.cpp>

build_flags =
    -I include
    -I lib
    -I $PROJECT_PACKAGES_DIR/framework-arduino-sam/system/libsam/include
